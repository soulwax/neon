[databases]
starchild_frontend      = host=host.docker.internal port=55433 dbname=starchild_frontend
starchild_backend       = host=host.docker.internal port=55433 dbname=starchild_backend
starchild_backend_shadow = host=host.docker.internal port=55433 dbname=starchild_backend_shadow
coindguild              = host=host.docker.internal port=55433 dbname=coindguild
coinguild               = host=host.docker.internal port=55433 dbname=coinguild
postgres                = host=host.docker.internal port=55433 dbname=postgres
blueglass               = host=host.docker.internal port=55433 dbname=blueglass
bluesix                 = host=host.docker.internal port=55433 dbname=bluesix
bluesixdev              = host=host.docker.internal port=55433 dbname=bluesixdev
difflab                 = host=host.docker.internal port=55433 dbname=difflab
filekitsune             = host=host.docker.internal port=55433 dbname=filekitsune
isobel                  = host=host.docker.internal port=55433 dbname=isobel
isobel_web              = host=host.docker.internal port=55433 dbname=isobel_web

; Wildcard fallback: route any other (existing/future) database to compute.
; Explicit entries above win; this catches anything not listed so we don't
; have to hand-maintain the list. Auth is still enforced (TLS + SCRAM userlist).
* = host=host.docker.internal port=55433

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction mode: best for serverless (Vercel) and Auth.js/Prisma under load.
; Tradeoff: SET, advisory locks, LISTEN/NOTIFY, and named prepared statements
; do not survive across transactions. Use POSTGRES_URL_UNPOOLED for migrations
; and anything that needs session-level behaviour.
pool_mode = transaction

; Server connections Postgres actually sees (per db+user pool)
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3

; Client-facing limit — PgBouncer handles up to 1000 concurrent client connections
max_client_conn = 1000

; Required for Prisma compatibility: it sends extra_float_digits at startup
ignore_startup_parameters = extra_float_digits

; Server-side SSL: Postgres compute has SSL enabled; require it but skip CA verify
; (internal Docker network — self-signed cert is fine)
server_tls_sslmode = require

; Client-facing SSL: clients must use SSL
client_tls_sslmode = require
client_tls_cert_file = /etc/pgbouncer/server.crt
client_tls_key_file  = /etc/pgbouncer/server.key

; Reduce log noise in production
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Keepalive to detect dead Postgres backends quickly
server_idle_timeout = 600
client_idle_timeout = 0
tcp_keepalive = 1
